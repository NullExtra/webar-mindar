<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebAR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
      AFRAME.registerComponent('sticky-model', {
        init: function () {
          this.target = document.querySelector('#myTarget');
          this.model = document.querySelector('#myModel');
          
          // Sembunyikan model 3D sebelum marker di-scan pertama kali
          this.model.setAttribute('visible', false);
          
          // Saat marker berhasil discan, tampilkan model 3D
          this.target.addEventListener('targetFound', () => {
            this.model.setAttribute('visible', true);
          });
        },
        tick: function () {
          // Selama marker terdeteksi secara realtime, model akan terus menempel pada koordinat marker
          if (this.target.object3D.visible) {
            this.model.object3D.position.copy(this.target.object3D.position);
            this.model.object3D.rotation.copy(this.target.object3D.rotation);
            this.model.object3D.scale.copy(this.target.object3D.scale);
          }
          // Jika marker hilang (visible = false), script ini berhenti meng-copy posisi, 
          // sehingga model membeku di posisi terakhirnya dan tetap terlihat.
        }
      });
    </script>
  </head>
  <body>
    <a-scene sticky-model mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="model3D" src="./3.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="myTarget" mindar-image-target="targetIndex: 0"></a-entity>
      
      <a-entity id="myModel">
        <a-gltf-model rotation="90 45 0" position="0 0 0" scale="1.5 1.5 1.5" src="#model3D"></a-gltf-model>
      </a-entity>
      
    </a-scene>
  </body>
</html>
